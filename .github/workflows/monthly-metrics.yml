name: Aghieri Monthly Snapshot

on:
  schedule:
    - cron: '0 14 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  snapshot:
    name: Paco app metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const monthKey = new Date().toISOString().slice(0, 7);
            const sinceISO = new Date(Date.now() - 30*24*60*60*1000).toISOString();
            const commits = await github.request('GET /repos/{owner}/{repo}/commits', { owner, repo, since: sinceISO, per_page: 100 });
            const repoData = await github.rest.repos.get({ owner, repo });
            const body = `| Month | Commits | Stars | Issues Open |\n|---|---:|---:|---:|\n| ${monthKey} | ${commits.data.length} | ${repoData.data.stargazers_count} | ${repoData.data.open_issues_count} |`;
            const title = "Aghieri Monthly Snapshot";
            const label = "paco-metrics";
            try { await github.rest.issues.getLabel({ owner, repo, name: label }); }
            catch (e) { if (e.status === 404) await github.rest.issues.createLabel({ owner, repo, name: label, color: '1d76db' }); }
            const list = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label });
            let issue = list.data.find(i => i.title === title);
            if (!issue) {
              await github.rest.issues.create({ owner, repo, title, labels: [label], body });
            } else {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, body: `${issue.body}\n${body.split('\n').pop()}` });
            }
